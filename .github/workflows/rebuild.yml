name: Rebuild WOTD (no fetch)

# Recomputes stats, WOTD, LLM blurb, Parquet exports, and the site from
# the articles already on disk in data/articles/. No feed fetches, no
# article-body requests. Useful after code changes to the scorer,
# templates, or term extraction — "retry yesterday's brain without
# re-downloading yesterday's news".

on:
  workflow_dispatch:

concurrency:
  group: wotd-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Restore full-text cache (read-only)
        uses: actions/cache/restore@v4
        with:
          path: .cache/wotd/fulltext
          key: fulltext-readonly
          restore-keys: |
            fulltext-

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Re-bucket historical articles by fetched_at
        run: wotd migrate-buckets

      - name: Process stats (all historical days)
        run: wotd process --backfill

      - name: Elect WOTD (all historical days)
        run: wotd wotd --backfill

      - name: Claude blurb (latest elected day only; skipped if key absent)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: wotd blurb

      - name: Export Parquet
        run: wotd export

      - name: Render site
        run: wotd build

      - name: Commit & push
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name  "ai-wotd-bot"
            git config user.email "ai-wotd-bot@users.noreply.github.com"
            git add data/ docs/
            WORD=$(for f in $(ls -r data/wotd/*.json 2>/dev/null); do w=$(jq -r '.word // empty' "$f"); if [ -n "$w" ]; then echo "$w"; break; fi; done)
            WORD=${WORD:-update}
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "chore(wotd): rebuild ${DATE} — ${WORD}"
            git push origin HEAD
            echo "Pushed rebuild with word: ${WORD}"
          else
            echo "No changes from rebuild."
          fi
