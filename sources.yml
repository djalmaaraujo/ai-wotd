  - id: google-deepmind
    type: rss
    name: "Google DeepMind Blog"
    url: "https://deepmind.google/discover/blog/"
    feed: "https://deepmind.google/blog/rss.xml"
    added: "2026-04-13"

  - id: huggingface-blog
    type: rss
